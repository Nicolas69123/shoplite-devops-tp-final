# Rotation des logs Docker : 10 Mo max par fichier, 3 fichiers conserves.
# En production reelle, les logs JSON seraient expedies vers une stack
# centralisee (Loki + Grafana ou ELK) via un agent (promtail, filebeat).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    container_name: shoplite_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shoplite}
      POSTGRES_USER: ${POSTGRES_USER:-shoplite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shoplite_password}
    volumes:
      - shoplite_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - shoplite_net

  api:
    build: ./api
    container_name: shoplite_api
    environment:
      API_PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-shoplite}:${POSTGRES_PASSWORD:-shoplite_password}@db:5432/${POSTGRES_DB:-shoplite}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_VERSION: ${APP_VERSION:-starter}
    depends_on:
      db:
        condition: service_healthy
    # Readiness applicative : l'API n'est consideree prete que si elle
    # repond sur /ready (donc PostgreSQL joignable), pas seulement vivante.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ready || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - shoplite_net

  frontend:
    build: ./frontend
    container_name: shoplite_frontend
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks:
      - shoplite_net

  proxy:
    image: nginx:1.27-alpine
    container_name: shoplite_proxy
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks:
      - shoplite_net

volumes:
  shoplite_pgdata:

networks:
  shoplite_net:
    driver: bridge
