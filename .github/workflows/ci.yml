name: CI

on:
  push:
    branches: [main, develop, "feature/**", "hotfix/**"]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint et format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Installer les dependances
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (format bloquant)
        run: npm run format:check

  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shoplite
          POSTGRES_USER: shoplite
          POSTGRES_PASSWORD: shoplite_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shoplite -d shoplite"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://shoplite:shoplite_password@localhost:5432/shoplite
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Installer les dependances
        run: npm ci

      - name: Tests avec couverture (seuil 80%)
        run: npm test

      - name: Publier le rapport de couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: api/coverage/
          retention-days: 14

  audit:
    name: Audit dependances
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Installer les dependances
        run: npm ci

      - name: npm audit (vulnerabilites)
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: npm outdated (dependances obsoletes)
        run: npm outdated || true

  build:
    name: Build images Docker
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build de l'image API
        run: docker build -t shoplite-api:ci ./api

      - name: Build de l'image frontend
        run: docker build -t shoplite-frontend:ci ./frontend

      - name: Taille des images
        run: docker images | grep shoplite

  security:
    name: Scan securite Trivy
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Build de l'image API a scanner
        run: docker build -t shoplite-api:scan ./api

      - name: Scan Trivy (vulnerabilites image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: shoplite-api:scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
